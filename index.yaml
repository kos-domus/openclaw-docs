# OpenClaw Docs — Root Index
# Top-level entry point for discovering this repository's structure
#
# For agents: fetch this file first to understand the repo layout,
# then fetch docs/index.yaml for the full documentation index.

project:
  name: "openclaw-docs"
  description: "Community-driven, AI-elaborated documentation for Claude Code"
  repository: "https://github.com/kos-0/openclaw-docs"
  license: "MIT"

structure:
  sessions:
    path: "sessions/"
    description: "Raw work session logs contributed by the community"
    template: "sessions/_template.md"
    schema: "sessions/schema.yaml"

  docs:
    path: "docs/"
    index: "docs/index.yaml"
    description: "Structured documentation generated by Kos"
    categories:
      - slug: "getting-started"
        path: "docs/getting-started/"
        description: "Installation, first run, basic setup"
      - slug: "guides"
        path: "docs/guides/"
        description: "Step-by-step how-to for specific tasks"
      - slug: "reference"
        path: "docs/reference/"
        description: "Complete reference for settings, hooks, skills, MCP"
      - slug: "concepts"
        path: "docs/concepts/"
        description: "Architecture, mental models, design decisions"
      - slug: "troubleshooting"
        path: "docs/troubleshooting/"
        description: "Known issues, errors, and solutions"

  changelog:
    path: "changelog/CHANGELOG.md"
    description: "Log of all Kos elaboration runs"

fetching:
  docs_index: "docs/index.yaml"
  raw_base_url: "https://raw.githubusercontent.com/kos-0/openclaw-docs/main/"
  example: "curl -s ${raw_base_url}docs/index.yaml"
