last_check: '2026-05-01'
sources:
  github:
    repo: openclaw/openclaw
    url: https://github.com/openclaw/openclaw
    last_known_version: 2026.4.29
    last_known_release_date: '2026-04-30'
    permanent: true
    check_methods:
      releases_api: gh api repos/openclaw/openclaw/releases/latest
      tags_api: gh api repos/openclaw/openclaw/tags --jq '.[0]'
      changelog_raw: https://raw.githubusercontent.com/openclaw/openclaw/main/CHANGELOG.md
      docs_folder: gh api repos/openclaw/openclaw/contents/docs
    watch:
    - CHANGELOG.md
    - docs/
    - package.json
    - src/config/
  npm:
    package: openclaw
    url: https://www.npmjs.com/package/openclaw
    last_known_version: 2026.4.29
    permanent: true
    check_methods:
      npm_view: npm view openclaw version
      npm_info: npm view openclaw --json
  docs:
    url: https://docs.openclaw.ai
    permanent: true
    key_pages:
    - path: /configuration
      tracks: settings, config files, environment variables
    - path: /skills
      tracks: ClawHub skills, custom skills, skill API
    - path: /agents
      tracks: agent architecture, multi-agent, workspaces
    - path: /channels
      tracks: WhatsApp, Telegram, Discord integrations
    - path: /security
      tracks: auth, encryption, credential management
    - path: /changelog
      tracks: release notes, breaking changes, deprecations
    - path: /mcp
      tracks: MCP server configuration, tool providers
    - path: /hooks
      tracks: lifecycle hooks, event hooks, automation
installed:
  local_cli_version: 2026.4.29
  checked_at: '2026-05-01'
  upgraded_from: 2026.4.24
  upgraded_at: '2026-05-01T10:25:00+02:00'
  upgrade_notes: |
    Upgraded from 2026.4.24 → 2026.4.29 in a single hop. Pre-flight smoke
    test of agent profiles confirmed the breaking change in 2026.4.29
    (restrictive profiles `minimal`/`messaging` no longer inherit
    `tools.exec` / `tools.fs` implicitly) does NOT impact this fleet —
    6/8 agents use the `coding` profile which retains fs+exec by design,
    the other 2 (cos, family) have explicit `tools.allow` lists.
    Post-upgrade verification: gateway active, 8/8 agents registered,
    51/51 cron jobs preserved, 9/9 routing bindings intact, no errors
    in journal.
