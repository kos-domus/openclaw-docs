site_name: OpenClaw Docs
site_description: Community-driven, AI-elaborated documentation for Claude Code (OpenClaw)
site_url: https://kos-domus.github.io/openclaw-docs/
repo_url: https://github.com/kos-domus/openclaw-docs
repo_name: kos-domus/openclaw-docs

docs_dir: docs

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
    - toc.integrate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html
  - def_list

nav:
  - Home: index.md
  - Getting Started:
      - Hardware & OS Setup: getting-started/hardware-and-os-setup.md
      - Authentication: getting-started/authentication.md
      - First Run Verification: getting-started/first-run-verification.md
  - Guides:
      - Google Drive Integration: guides/google-drive-integration.md
      - Remote Access: guides/remote-access.md
      - WhatsApp Bot: guides/whatsapp-bot.md
      - Telegram Bot: guides/telegram-bot.md
      - Google Workspace CLI: guides/google-workspace-cli.md
      - Skills & Slash Commands: guides/skills-and-slash-commands.md
      - 1Password Secrets: guides/1password-secrets-management.md
      - Cron Jobs & Automation: guides/cron-jobs-and-automation.md
  - Concepts:
      - Multi-Agent Architecture: concepts/multi-agent-architecture.md
      - Workspace Isolation: concepts/workspace-isolation.md
      - Bootstrap Files: concepts/bootstrap-files.md
      - Semantic Data Layer: concepts/semantic-data-layer.md
      - Agent Fleet Design: concepts/agent-fleet-design.md
  - Reference:
      - Settings: reference/claude-code-settings.md
      - GWS CLI Reference: reference/gws-cli-reference.md
      - MCP Servers: reference/mcp-servers.md
  - Troubleshooting:
      - Common Errors: troubleshooting/common-errors.md
      - Integration Issues: troubleshooting/integration-issues.md
